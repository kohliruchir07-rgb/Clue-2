<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is this what we think it is?</title>
<style>
:root{--bg:#1b3055;--bg2:#162844;--bg3:#0f1e33;--gold:#e8c46a;--gold2:#f5d98a;--text:#f0eee8;--muted:rgba(240,238,232,0.55);--font:'Trebuchet MS',Trebuchet,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:.75rem;text-align:center;}
.prog-row{display:flex;align-items:center;gap:12px;margin-bottom:.75rem;width:100%;max-width:520px;}
.prog-track{flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold2));border-radius:99px;transition:width .35s;}
.prog-lbl{font-size:13px;color:var(--muted);min-width:52px;text-align:right;font-weight:500;}
#puzzle-wrap{border-radius:14px;overflow:hidden;box-shadow:0 16px 56px rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.13);position:relative;}
#puzzle-canvas{display:block;touch-action:none;cursor:grab;}
#puzzle-canvas:active{cursor:grabbing;}
.action-row{display:flex;gap:10px;justify-content:center;margin-top:.9rem;}
.btn{padding:9px 20px;border-radius:9px;font-size:13px;font-family:var(--font);font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.04em;background:rgba(255,255,255,0.13);color:var(--text);border:1px solid rgba(255,255,255,0.26);}
.btn:hover{background:rgba(255,255,255,0.18);transform:translateY(-1px);}
#solved-overlay{display:none;position:fixed;inset:0;background:rgba(11,20,35,0.93);z-index:100;align-items:center;justify-content:center;padding:2rem;}
#solved-overlay.show{display:flex;}
.solved-card{background:var(--bg2);border:1px solid rgba(232,196,106,0.3);border-radius:20px;padding:2.5rem 2rem;text-align:center;max-width:440px;width:100%;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.solved-icon{font-size:52px;margin-bottom:1rem;}
.solved-card h2{font-size:26px;font-weight:700;color:var(--gold);margin-bottom:1.2rem;}
.clue-reveal{background:var(--bg3);border:1px solid rgba(232,196,106,0.3);border-radius:12px;padding:1.5rem;margin:0 0 1.5rem;}
.clue-text{font-size:15px;font-weight:500;color:var(--text);line-height:2;font-style:italic;text-align:left;}
@keyframes cf{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100px) rotate(720deg);opacity:0;}}
.cp{position:fixed;width:8px;height:8px;border-radius:2px;animation:cf 1.3s ease-in forwards;pointer-events:none;z-index:200;}
</style>
</head>
<body>
<div class="title">Is this what we think it is?</div>
<div class="prog-row">
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="prog-lbl" id="prog-lbl">0 / 16</span>
</div>
<div id="puzzle-wrap"><canvas id="puzzle-canvas"></canvas></div>
<div class="action-row">
  <button class="btn" onclick="shufflePieces()">&#x21BA; Shuffle</button>
  <button class="btn" onclick="useHint()">&#x1F4A1; Hint</button>
</div>

<div id="solved-overlay">
  <div id="confetti-root" style="position:fixed;inset:0;pointer-events:none;overflow:hidden;"></div>
  <div class="solved-card">
    <div class="solved-icon">&#x1F511;</div>
    <h2>Patience is Key</h2>
    <div class="clue-reveal">
      <div class="clue-text">
        Riddles are rarely given without reason.<br>
        Uncertainty makes the game interesting.<br>
        Carefully observe what is hidden.<br>
        Hints sometimes hide in plain sight.<br>
        Investigate the beginnings.<br>
        Revelation often lies there.
      </div>
    </div>
    <button class="btn" onclick="replayPuzzle()" style="background:var(--gold);color:var(--bg3);border:none;">&#x21BA; Play again</button>
  </div>
</div>

const S = {
  img: null, pieces: [],
  drag: null, dox: 0, doy: 0,
  CW: 0, CH: 0, PW: 0, PH: 0,
  animId: null
};

window.onload = function() {
  const img = new Image();
  img.onload = () => { S.img = img; buildPuzzle(); startRender(); };
  img.src = IMGDATA;
};

function buildPuzzle() {
  const cols = COLS, rows = COLS;
  const maxW = Math.min(500, window.innerWidth - 40);
  const CW = maxW;
  const CH = Math.round(CW * (S.img.height / S.img.width));
  S.CW = CW; S.CH = CH;
  S.PW = Math.floor(CW / cols);
  S.PH = Math.floor(CH / rows);
  const wrap = document.getElementById('puzzle-wrap');
  wrap.style.width = CW + 'px';
  wrap.style.height = CH + 'px';
  const canvas = document.getElementById('puzzle-canvas');
  canvas.width = CW;
  canvas.height = CH;
  S.pieces = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      S.pieces.push({ id: r*cols+c, row: r, col: c, tx: c*S.PW, ty: r*S.PH, x: 0, y: 0, placed: false });
    }
  }
  shufflePieces();
}

function shufflePieces() {
  const { CW, CH, PW, PH } = S;
  S.pieces.forEach(p => { p.placed = false; p.x = Math.random()*(CW-PW); p.y = Math.random()*(CH-PH); });
  updateProgress();
}

function replayPuzzle() {
  document.getElementById('solved-overlay').classList.remove('show');
  shufflePieces();
}

function updateProgress() {
  const tot = S.pieces.length;
  const placed = S.pieces.filter(p => p.placed).length;
  document.getElementById('prog-fill').style.width = (tot ? Math.round(placed/tot*100) : 0) + '%';
  document.getElementById('prog-lbl').textContent = placed + ' / ' + tot;
  if (placed === tot && tot > 0) setTimeout(() => { launchConfetti(); document.getElementById('solved-overlay').classList.add('show'); }, 500);
}

function launchConfetti() {
  const root = document.getElementById('confetti-root');
  const colors = ['#e8c46a','#f5d98a','#5ecfa0','#7db8f7','#f07a7a','#c97ef5'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'cp';
    el.style.cssText = `left:${Math.random()*100}%;top:${-10-Math.random()*40}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.9}s;animation-duration:${1+Math.random()*.6}s;`;
    root.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function drawPiece(ctx, p) {
  const { img, PW, PH } = S;
  const srcX = p.col * (img.width / COLS);
  const srcY = p.row * (img.height / COLS);
  const srcW = img.width / COLS;
  const srcH = img.height / COLS;
  ctx.save();
  ctx.beginPath();
  ctx.rect(p.x, p.y, PW, PH);
  ctx.clip();
  ctx.drawImage(img, srcX, srcY, srcW, srcH, p.x, p.y, PW, PH);
  ctx.restore();
  if (!p.placed) {
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(p.x + 0.75, p.y + 0.75, PW - 1.5, PH - 1.5);
  }
}

function startRender() {
  if (S.animId) { cancelAnimationFrame(S.animId); S.animId = null; }
  const canvas = document.getElementById('puzzle-canvas');
  const ctx = canvas.getContext('2d');
  function loop() {
    ctx.clearRect(0, 0, S.CW, S.CH);
    ctx.fillStyle = '#0f1e33';
    ctx.fillRect(0, 0, S.CW, S.CH);
    ctx.strokeStyle = 'rgba(232,196,106,0.06)';
    ctx.lineWidth = 1;
    for (let r = 0; r < COLS; r++) for (let c = 0; c < COLS; c++)
      ctx.strokeRect(c*S.PW+.5, r*S.PH+.5, S.PW-1, S.PH-1);
    S.pieces.forEach(p => { if (p.placed && p !== S.drag) drawPiece(ctx, p); });
    S.pieces.forEach(p => { if (!p.placed && p !== S.drag) drawPiece(ctx, p); });
    if (S.drag) drawPiece(ctx, S.drag);
    S.animId = requestAnimationFrame(loop);
  }
  loop();
}

function getPos(e) {
  const c = document.getElementById('puzzle-canvas');
  const rect = c.getBoundingClientRect();
  const scX = c.width/rect.width, scY = c.height/rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX-rect.left)*scX, y: (src.clientY-rect.top)*scY };
}

const cv = document.getElementById('puzzle-canvas');
cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('touchstart', onDown, { passive: false });
cv.addEventListener('touchmove', onMove, { passive: false });
cv.addEventListener('touchend', onUp);

function onDown(e) {
  e.preventDefault();
  const { x, y } = getPos(e);
  const { PW, PH } = S;
  for (let i = S.pieces.length - 1; i >= 0; i--) {
    const p = S.pieces[i];
    if (x >= p.x && x <= p.x+PW && y >= p.y && y <= p.y+PH) {
      S.drag = p; S.dox = x-p.x; S.doy = y-p.y;
      S.pieces.splice(i, 1); S.pieces.push(p);
      break;
    }
  }
}
function onMove(e) { e.preventDefault(); if (!S.drag) return; const {x,y}=getPos(e); S.drag.x=x-S.dox; S.drag.y=y-S.doy; }
function onUp() {
  const p = S.drag; if (!p) return;
  const snap = Math.min(S.PW, S.PH) * 0.4;
  if (Math.abs(p.x-p.tx) < snap && Math.abs(p.y-p.ty) < snap) { p.x=p.tx; p.y=p.ty; p.placed=true; }
  S.drag = null; updateProgress();
}
function useHint() {
  const u = S.pieces.filter(p => !p.placed); if (!u.length) return;
  const p = u[Math.floor(Math.random()*u.length)];
  p.x=p.tx; p.y=p.ty; p.placed=true; updateProgress();
}
</script>
